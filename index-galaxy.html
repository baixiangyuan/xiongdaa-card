<!DOCTYPE html>
<html lang="zh-CN" data-theme="galaxy">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>bxy ✦ 星河</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="tools/common.css">
    <style>
        :root { --gx-bg:#050010; --gx-surface:rgba(15,8,40,0.7); --gx-border:rgba(147,130,255,0.18); --gx-text:#e8e0ff; --gx-muted:rgba(180,170,220,0.65); --gx-accent:#b388ff; --gx-accent2:#ff80ab; --gx-glow:rgba(179,136,255,0.25); --glass-bg:var(--gx-surface); --glass-border:var(--gx-border); --text-main:var(--gx-text); --text-muted:var(--gx-muted); --theme-accent:var(--gx-accent); --theme-accent2:var(--gx-accent2); }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans SC','Exo 2',sans-serif;-webkit-tap-highlight-color:transparent;}
        body{min-height:100vh;display:block;background:var(--gx-bg);background-attachment:fixed;color:var(--gx-text);overflow-x:hidden;padding:0;}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 60% 20%,rgba(179,136,255,0.06) 0%,transparent 50%),radial-gradient(ellipse at 20% 80%,rgba(255,128,171,0.04) 0%,transparent 50%);}
        #skeleton-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100000;background:var(--gx-bg);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 0.7s;}
        #skeleton-overlay.fade-out{opacity:0;pointer-events:none;}
        .skeleton-spinner{width:45px;height:45px;border:2px solid rgba(179,136,255,0.15);border-top-color:var(--gx-accent);border-radius:50%;animation:spin 0.9s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .skeleton-text{color:var(--gx-accent);font-family:'Exo 2',sans-serif;margin-top:16px;font-size:0.85rem;letter-spacing:3px;}
        @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

        /* 星河网格布局 */
        .gx-wrap{position:relative;z-index:10;width:100%;max-width:1100px;margin:0 auto;padding:20px;animation:gxIn 0.9s ease forwards;}
        @keyframes gxIn{from{opacity:0;transform:scale(0.95);}to{opacity:1;transform:scale(1);}}

        .gx-card{background:var(--gx-surface);backdrop-filter:blur(32px) saturate(140%);-webkit-backdrop-filter:blur(32px) saturate(140%);border:1px solid var(--gx-border);border-radius:20px;box-shadow:0 15px 40px rgba(0,0,0,0.4);padding:25px;transition:all 0.5s;}
        .gx-card:hover{box-shadow:0 20px 50px rgba(0,0,0,0.5),0 0 30px var(--gx-glow);}

        /* 顶部时钟横跨全宽 */
        .gx-clock-bar{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:20px;padding:20px 30px;}
        .gx-clock-left{display:flex;align-items:center;gap:20px;}
        .gx-avatar-sm{width:50px;height:50px;border-radius:50%;background:url('https://q1.qlogo.cn/g?b=qq&nk=3075304265&s=640') center/cover;border:2px solid rgba(179,136,255,0.3);flex-shrink:0;}
        .gx-clock-center{text-align:center;flex:1;}
        .gx-time{font-family:'Exo 2',sans-serif;font-size:3.5rem;font-weight:700;letter-spacing:4px;background:linear-gradient(135deg,var(--gx-accent),var(--gx-accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .gx-date{font-size:0.85rem;color:var(--gx-muted);letter-spacing:2px;}
        .gx-weather-mini{text-align:right;}
        .gx-weather-mini .weather-icon{color:var(--gx-accent);font-size:1.5rem;}
        .gx-weather-mini .weather-temp{font-family:'Exo 2',sans-serif;font-size:1.2rem;color:var(--gx-accent2);}
        .gx-weather-mini .weather-desc,.gx-weather-mini .weather-city{font-size:0.7rem;color:var(--gx-muted);}

        /* 三列主网格 */
        .gx-grid{display:grid;grid-template-columns:280px 1fr 280px;gap:20px;margin-bottom:20px;}

        /* 左列：个人资料 */
        .gx-profile{text-align:center;padding:30px 20px;}
        .gx-avatar{width:85px;height:85px;border-radius:50%;margin:0 auto 15px;background:url('https://q1.qlogo.cn/g?b=qq&nk=3075304265&s=640') center/cover;border:2px solid rgba(179,136,255,0.3);box-shadow:0 8px 25px rgba(179,136,255,0.2);}
        .gx-name{font-family:'Exo 2',sans-serif;font-size:1.3rem;font-weight:600;letter-spacing:2px;color:var(--gx-accent);margin-bottom:10px;}
        .gx-hitokoto{font-size:0.85rem;color:var(--gx-muted);line-height:1.7;min-height:40px;margin-bottom:15px;}
        .gx-links{display:flex;flex-direction:column;gap:8px;}
        .gx-link{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(179,136,255,0.06);border:1px solid rgba(179,136,255,0.12);border-radius:12px;color:var(--gx-text);text-decoration:none;font-size:0.83rem;transition:all 0.3s;cursor:pointer;}
        .gx-link:hover{background:rgba(179,136,255,0.15);border-color:var(--gx-accent);transform:translateX(4px);}
        .gx-link i{width:18px;text-align:center;color:var(--gx-accent);}
        .gx-stats{display:flex;justify-content:center;gap:20px;margin-top:15px;font-size:0.75rem;color:var(--gx-muted);}
        .gx-stats .num{color:var(--gx-accent);font-weight:600;font-family:'Exo 2',sans-serif;}

        /* 中列：功能网格 */
        .gx-func-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
        .gx-func{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 10px;background:rgba(179,136,255,0.04);border:1px solid rgba(179,136,255,0.1);border-radius:16px;text-decoration:none;color:var(--gx-text);transition:all 0.3s;cursor:pointer;}
        .gx-func:hover{background:rgba(179,136,255,0.12);border-color:var(--gx-accent);transform:translateY(-3px);box-shadow:0 8px 25px var(--gx-glow);}
        .gx-func i{font-size:1.5rem;color:var(--gx-accent);transition:all 0.3s;}
        .gx-func:hover i{color:var(--gx-accent2);}
        .gx-func span{font-size:0.72rem;color:var(--gx-muted);letter-spacing:1px;}

        /* 右列：播放器 */
        .gx-player-card{padding:22px;display:flex;flex-direction:column;gap:12px;}
        .gx-vinyl-wrap{display:flex;align-items:center;gap:15px;}
        .gx-vinyl{width:65px;height:65px;border-radius:50%;flex-shrink:0;overflow:hidden;border:2px solid rgba(179,136,255,0.25);}
        .gx-vinyl.playing{animation:vinylSpin 3.5s linear infinite;}
        @keyframes vinylSpin{to{transform:rotate(360deg);}}
        .gx-vinyl img{width:100%;height:100%;object-fit:cover;}
        .gx-player-info{flex:1;min-width:0;}
        .gx-player-title{font-size:0.95rem;color:var(--gx-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .gx-player-artist{font-size:0.75rem;color:var(--gx-muted);margin-top:2px;}
        .gx-progress{width:100%;height:4px;background:rgba(179,136,255,0.1);border-radius:2px;cursor:pointer;}
        .gx-progress-fill{height:100%;background:linear-gradient(90deg,var(--gx-accent),var(--gx-accent2));border-radius:2px;width:0%;}
        .gx-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
        .gx-btn{background:rgba(179,136,255,0.08);border:1px solid rgba(179,136,255,0.15);color:var(--gx-text);padding:7px 12px;border-radius:10px;cursor:pointer;font-size:0.78rem;transition:all 0.3s;}
        .gx-btn:hover{background:rgba(179,136,255,0.2);border-color:var(--gx-accent);}
        .gx-btn.play-pause{background:linear-gradient(135deg,var(--gx-accent),var(--gx-accent2));color:#fff;border:none;padding:10px 16px;}
        .gx-search{display:flex;gap:6px;}
        .gx-search input{flex:1;background:rgba(179,136,255,0.05);border:1px solid rgba(179,136,255,0.12);color:var(--gx-text);padding:8px 12px;border-radius:10px;font-size:0.82rem;outline:none;}
        .gx-search input:focus{border-color:var(--gx-accent);}
        .gx-search input::placeholder{color:var(--gx-muted);}
        .music-list{max-height:180px;overflow-y:auto;margin-top:8px;}
        .music-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid rgba(179,136,255,0.06);cursor:pointer;transition:all 0.2s;border-radius:8px;}
        .music-item:hover,.music-item.active{background:rgba(179,136,255,0.08);}
        .music-item .play-icon{color:var(--gx-accent);font-size:0.75rem;}
        .music-item .music-name{font-size:0.82rem;} .music-item .music-artist{font-size:0.68rem;color:var(--gx-muted);}
        .music-item .music-duration{font-size:0.68rem;color:var(--gx-muted);margin-left:auto;}
        .source-tag{font-size:0.58rem;padding:2px 5px;border:1px solid rgba(255,128,171,0.3);color:var(--gx-accent2);border-radius:8px;}
        .status-msg{text-align:center;padding:18px;color:var(--gx-muted);font-size:0.82rem;}

        /* 面板复用 */
        #history-panel,#bg-settings-panel{max-height:0;overflow:hidden;transition:max-height 0.4s ease, padding 0.4s ease, border-width 0.4s ease;margin-top:10px;border:1px solid var(--gx-border);border-radius:12px;}
        #history-panel.show{max-height:300px;padding:15px;border-width:1px;}
        #bg-settings-panel.show{max-height:400px;padding:15px;border-width:1px;}
        #lyric-panel{max-height:0;overflow:hidden;transition:max-height 0.4s ease, padding 0.4s ease, border-width 0.4s ease;margin-top:10px;border:1px solid var(--gx-border);border-radius:12px;background:rgba(0,0,0,0.15);}
        #lyric-panel.show{max-height:280px;padding:15px;border-width:1px;}
        .lyric-header{display:flex;justify-content:space-between;padding:10px 14px;background:rgba(179,136,255,0.05);border-bottom:1px solid var(--gx-border);font-size:0.8rem;color:var(--gx-accent);}
        #lyric-content{max-height:220px;overflow-y:auto;padding:30px 0;scroll-behavior:smooth;text-align:center;position:relative;}
        #history-content{max-height:180px;overflow-y:auto;padding:10px;scroll-behavior:smooth;}
        .lyric-line{padding:5px 10px;cursor:pointer;font-size:0.82rem;color:var(--gx-muted);transition:all 0.3s;border-radius:6px;line-height:1.5;}
        .lyric-line:hover{background:rgba(179,136,255,0.06);} .lyric-line.active{color:var(--gx-accent);font-weight:600;font-size:0.95rem;text-shadow:0 0 10px rgba(179,136,255,0.5);}
        .lyric-line.past{opacity:0.35;} .lyric-empty,.history-empty{text-align:center;padding:18px;color:var(--gx-muted);}
        .history-item{display:flex;align-items:center;padding:7px;gap:8px;border-bottom:1px solid rgba(179,136,255,0.05);}
        .history-info{flex:1;cursor:pointer;} .history-name{font-size:0.82rem;} .history-artist{font-size:0.68rem;color:var(--gx-muted);}
        .history-time{font-size:0.62rem;color:var(--gx-muted);} .history-delete{cursor:pointer;color:var(--gx-muted);} .history-delete:hover{color:#ff6b6b;}
        .bg-option{display:inline-block;width:80px;margin:6px;text-align:center;cursor:pointer;border:1px solid transparent;border-radius:10px;padding:4px;}
        .bg-option.active,.bg-option:hover{border-color:var(--gx-accent);}
        .bg-option img{width:100%;border-radius:8px;} .bg-option-label{font-size:0.68rem;color:var(--gx-muted);margin-top:3px;}
        .bg-upload-btn{display:inline-block;padding:8px 14px;background:rgba(179,136,255,0.08);border:1px solid var(--gx-border);color:var(--gx-text);cursor:pointer;border-radius:10px;font-size:0.78rem;margin:6px 0;}
        .bg-upload-btn input{display:none;}
        .bg-url-input{width:100%;padding:7px;background:rgba(179,136,255,0.05);border:1px solid rgba(179,136,255,0.12);color:var(--gx-text);border-radius:8px;font-size:0.78rem;outline:none;}
        .bg-reset-btn{padding:5px 12px;background:rgba(255,71,87,0.08);border:1px solid rgba(255,71,87,0.2);color:#ff6b6b;cursor:pointer;border-radius:8px;font-size:0.78rem;}
        .video-scale-selector{margin-top:6px;font-size:0.72rem;color:var(--gx-muted);}
        .video-scale-btn{padding:4px 8px;background:rgba(179,136,255,0.05);border:1px solid rgba(179,136,255,0.1);color:var(--gx-muted);cursor:pointer;border-radius:6px;font-size:0.68rem;margin:0 3px;}
        .video-scale-btn.active{border-color:var(--gx-accent);color:var(--gx-accent);}

        /* Toast */
        #toast{position:fixed;top:auto;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);z-index:99999;background:var(--gx-surface);border:1px solid var(--gx-border);color:var(--gx-text);padding:12px 24px;border-radius:14px;backdrop-filter:blur(20px);transition:transform 0.4s;font-size:0.83rem;}
        #toast.show{transform:translateX(-50%) translateY(0);}

        /* 日志 */
        #log-trigger-btn{position:fixed;bottom:20px;right:20px;z-index:9998;width:42px;height:42px;border-radius:14px;background:var(--gx-surface);border:1px solid var(--gx-border);color:var(--gx-accent);cursor:pointer;backdrop-filter:blur(20px);transition:all 0.3s;}
        #log-trigger-btn:hover{background:rgba(179,136,255,0.15);}
        #log-panel{position:fixed;bottom:0;right:0;width:400px;max-height:55vh;z-index:9999;background:rgba(10,5,30,0.97);border:1px solid var(--gx-border);border-radius:16px 0 0 0;transform:translateY(100%);transition:transform 0.4s;overflow:hidden;display:flex;flex-direction:column;backdrop-filter:blur(20px);}
        #log-panel.show{transform:translateY(0);}
        .log-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--gx-border);font-size:0.8rem;color:var(--gx-accent);}
        .log-filter-tabs{display:flex;gap:5px;padding:8px 12px;border-bottom:1px solid rgba(179,136,255,0.08);overflow-x:auto;}
        .log-tab{font-size:0.68rem;padding:3px 8px;border-radius:8px;cursor:pointer;color:var(--gx-muted);border:1px solid transparent;transition:all 0.2s;}
        .log-tab.active{color:var(--gx-accent);border-color:var(--gx-accent);}
        #log-content{flex:1;overflow-y:auto;padding:10px;}
        .log-item{padding:8px;margin-bottom:5px;border-left:2px solid var(--gx-accent);background:rgba(179,136,255,0.03);font-size:0.72rem;border-radius:0 6px 6px 0;}
        .log-item.log-hidden{display:none;}
        .log-time{font-size:0.62rem;color:var(--gx-muted);} .log-cat-badge{font-size:0.52rem;padding:1px 4px;border-radius:6px;margin-left:5px;}
        .cat-system,.cat-player,.cat-api,.cat-lyrics,.cat-weather,.cat-error{background:rgba(179,136,255,0.1);color:var(--gx-accent);} .cat-error{color:#ff6b6b;}
        .log-data,.log-error{font-family:monospace;font-size:0.68rem;color:var(--gx-muted);background:rgba(0,0,0,0.25);padding:5px;border-radius:4px;white-space:pre-wrap;word-break:break-all;max-height:100px;overflow-y:auto;} .log-error{color:#ff6b6b;}

        /* 侧边栏 */
        #sidebar{position:fixed;top:0;left:-300px;width:270px;height:100vh;z-index:10000;background:rgba(10,5,30,0.98);border-right:1px solid var(--gx-border);transition:left 0.4s;overflow-y:auto;backdrop-filter:blur(20px);}
        #sidebar.show{left:0;} #sidebar-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:rgba(0,0,0,0.5);opacity:0;pointer-events:none;transition:opacity 0.4s;} #sidebar-overlay.show{opacity:1;pointer-events:auto;}
        #sidebar-trigger{position:fixed;top:20px;left:20px;z-index:9998;width:38px;height:38px;border-radius:12px;background:var(--gx-surface);border:1px solid var(--gx-border);color:var(--gx-accent);cursor:pointer;backdrop-filter:blur(20px);transition:all 0.3s;}
        #sidebar-trigger:hover{background:rgba(179,136,255,0.15);}
        .sidebar-header{padding:20px;border-bottom:1px solid var(--gx-border);text-align:center;} .sidebar-header h2{font-family:'Exo 2',sans-serif;font-size:1rem;color:var(--gx-accent);letter-spacing:3px;}
        .sidebar-link{display:flex;align-items:center;gap:10px;padding:11px 20px;color:var(--gx-text);text-decoration:none;font-size:0.83rem;transition:all 0.3s;border-left:2px solid transparent;}
        .sidebar-link:hover{background:rgba(179,136,255,0.06);border-left-color:var(--gx-accent);color:var(--gx-accent);}
        .sidebar-section-title{padding:10px 20px;font-size:0.68rem;color:var(--gx-muted);text-transform:uppercase;letter-spacing:2px;}
        .link-badge{font-size:0.58rem;padding:2px 6px;border:1px solid rgba(255,128,171,0.3);color:var(--gx-accent2);border-radius:8px;margin-left:auto;}
        .sidebar-footer{padding:15px 20px;border-top:1px solid var(--gx-border);}
        .sidebar-night-btn{width:100%;padding:10px;background:rgba(179,136,255,0.08);border:1px solid var(--gx-border);color:var(--gx-text);cursor:pointer;border-radius:10px;font-size:0.83rem;}

        /* Bio */
