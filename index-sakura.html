<!DOCTYPE html>
<html lang="zh-CN" data-theme="sakura">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>bxy 🌸 樱花</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="tools/common.css">
    <style>
        :root{--sk-bg:#1a0a10;--sk-surface:rgba(255,240,245,0.1);--sk-border:rgba(255,182,193,0.2);--sk-text:#fff0f3;--sk-muted:rgba(255,200,210,0.6);--sk-accent:#ff9eb5;--sk-accent2:#ffd1dc;--sk-glow:rgba(255,158,181,0.2);--glass-bg:var(--sk-surface);--glass-border:var(--sk-border);--text-main:var(--sk-text);--text-muted:var(--sk-muted);--theme-accent:var(--sk-accent);--theme-accent2:var(--sk-accent2);}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans SC','Zen Maru Gothic',sans-serif;-webkit-tap-highlight-color:transparent;}
        body{min-height:100vh;display:block;background:var(--sk-bg);background-attachment:fixed;color:var(--sk-text);overflow-x:hidden;padding:0;}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 40% 30%,rgba(255,158,181,0.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 70%,rgba(255,209,220,0.04) 0%,transparent 50%);}
        #skeleton-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100000;background:var(--sk-bg);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 0.7s;}
        #skeleton-overlay.fade-out{opacity:0;pointer-events:none;}
        .skeleton-spinner{width:42px;height:42px;border:2px solid rgba(255,158,181,0.15);border-top-color:var(--sk-accent);border-radius:50%;animation:spin 0.9s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .skeleton-text{color:var(--sk-accent);margin-top:16px;font-size:0.9rem;letter-spacing:3px;}
        @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

        /* 樱花瀑布流布局 */
        .sk-wrap{position:relative;z-index:10;width:100%;max-width:1000px;margin:0 auto;padding:20px;animation:skIn 1s ease forwards;}
        @keyframes skIn{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

        /* 瀑布流两列 */
        .sk-masonry{columns:2;column-gap:20px;}
        .sk-card{
            break-inside:avoid;margin-bottom:20px;
            background:var(--sk-surface);backdrop-filter:blur(28px) saturate(130%);-webkit-backdrop-filter:blur(28px) saturate(130%);
            border:1px solid var(--sk-border);border-radius:28px;box-shadow:0 12px 35px rgba(200,100,130,0.12);
            padding:25px;transition:all 0.5s;
        }
        .sk-card:hover{box-shadow:0 16px 45px rgba(200,100,130,0.2),0 0 25px var(--sk-glow);}

        /* 个人资料卡 (高卡) */
        .sk-profile{text-align:center;padding:35px 25px;}
        .sk-avatar{width:100px;height:100px;border-radius:50%;margin:0 auto 18px;background:url('https://q1.qlogo.cn/g?b=qq&nk=3075304265&s=640') center/cover;border:3px solid rgba(255,158,181,0.3);box-shadow:0 8px 25px rgba(255,158,181,0.15);}
        .sk-name{font-family:'Zen Maru Gothic',sans-serif;font-size:1.6rem;font-weight:700;color:var(--sk-accent);margin-bottom:12px;}
        .sk-hitokoto{font-size:0.88rem;color:var(--sk-muted);line-height:1.8;min-height:50px;margin-bottom:20px;}
        .sk-links{display:flex;flex-direction:column;gap:10px;}
        .sk-link{display:flex;align-items:center;gap:12px;padding:12px 18px;background:rgba(255,158,181,0.06);border:1px solid rgba(255,158,181,0.12);border-radius:16px;color:var(--sk-text);text-decoration:none;font-size:0.88rem;transition:all 0.3s;cursor:pointer;}
        .sk-link:hover{background:rgba(255,158,181,0.15);border-color:var(--sk-accent);transform:translateX(5px);}
        .sk-link i{width:22px;text-align:center;color:var(--sk-accent);}
        .sk-stats{display:flex;justify-content:center;gap:25px;margin-top:18px;font-size:0.8rem;color:var(--sk-muted);}
        .sk-stats .num{color:var(--sk-accent);font-weight:700;font-family:'Zen Maru Gothic',sans-serif;}

        /* 时钟天气卡 (矮卡) */
        .sk-clock{text-align:center;padding:25px;}
        .sk-time{font-family:'Zen Maru Gothic',sans-serif;font-size:3rem;font-weight:700;color:var(--sk-accent);letter-spacing:3px;}
        .sk-date{font-size:0.85rem;color:var(--sk-muted);margin-top:4px;}
        .sk-weather{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:15px;padding-top:15px;border-top:1px solid var(--sk-border);}
        .sk-weather .weather-icon{color:var(--sk-accent);font-size:1.8rem;}
        .sk-weather .weather-temp{font-size:1.3rem;font-weight:600;} .sk-weather .weather-desc,.sk-weather .weather-city{font-size:0.78rem;color:var(--sk-muted);}
        .weather-loading{color:var(--sk-muted);font-size:0.85rem;}

        /* 播放器卡 (高卡) */
        .sk-player{padding:22px;display:flex;flex-direction:column;gap:12px;}
        .sk-player-top{display:flex;align-items:center;gap:15px;}
        .sk-vinyl{width:68px;height:68px;border-radius:50%;flex-shrink:0;overflow:hidden;border:2px solid rgba(255,158,181,0.25);}
        .sk-vinyl.playing{animation:vinylSpin 3.5s linear infinite;}
        @keyframes vinylSpin{to{transform:rotate(360deg);}}
        .sk-vinyl img{width:100%;height:100%;object-fit:cover;}
        .sk-player-info{flex:1;min-width:0;}
        .sk-player-title{font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .sk-player-artist{font-size:0.78rem;color:var(--sk-muted);margin-top:2px;}
        .sk-progress{width:100%;height:4px;background:rgba(255,158,181,0.1);border-radius:2px;cursor:pointer;}
        .sk-progress-fill{height:100%;background:linear-gradient(90deg,var(--sk-accent),var(--sk-accent2));border-radius:2px;width:0%;}
        .sk-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
        .sk-btn{background:rgba(255,158,181,0.08);border:1px solid rgba(255,158,181,0.15);color:var(--sk-text);padding:8px 13px;border-radius:14px;cursor:pointer;font-size:0.8rem;transition:all 0.3s;}
        .sk-btn:hover{background:rgba(255,158,181,0.2);border-color:var(--sk-accent);}
        .sk-btn.play-pause{background:linear-gradient(135deg,var(--sk-accent),var(--sk-accent2));color:#fff;border:none;padding:10px 18px;}
        .sk-search{display:flex;gap:8px;}
        .sk-search input{flex:1;background:rgba(255,158,181,0.05);border:1px solid rgba(255,158,181,0.12);color:var(--sk-text);padding:9px 14px;border-radius:14px;font-size:0.85rem;outline:none;}
        .sk-search input:focus{border-color:var(--sk-accent);}
        .sk-search input::placeholder{color:var(--sk-muted);}
        .music-list{max-height:200px;overflow-y:auto;margin-top:8px;}
        .music-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid rgba(255,158,181,0.06);cursor:pointer;transition:all 0.2s;border-radius:12px;}
        .music-item:hover,.music-item.active{background:rgba(255,158,181,0.08);}
        .music-item .play-icon{color:var(--sk-accent);} .music-item .music-name{font-size:0.85rem;}
        .music-item .music-artist{font-size:0.7rem;color:var(--sk-muted);} .music-item .music-duration{font-size:0.7rem;color:var(--sk-muted);margin-left:auto;}
        .source-tag{font-size:0.6rem;padding:2px 6px;border:1px solid rgba(255,209,220,0.3);color:var(--sk-accent2);border-radius:12px;}
        .status-msg{text-align:center;padding:18px;color:var(--sk-muted);font-size:0.85rem;}

        /* 工具卡 (中等高度) */
        .sk-tools{padding:20px;}
        .sk-tools-title{font-size:0.9rem;color:var(--sk-accent);margin-bottom:12px;font-weight:600;letter-spacing:2px;}
        .sk-tools-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
        .sk-tool{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(255,158,181,0.05);border:1px solid rgba(255,158,181,0.1);border-radius:14px;text-decoration:none;color:var(--sk-text);font-size:0.82rem;transition:all 0.3s;cursor:pointer;}
        .sk-tool:hover{background:rgba(255,158,181,0.14);border-color:var(--sk-accent);transform:translateY(-2px);}
        .sk-tool i{color:var(--sk-accent);font-size:1rem;width:18px;text-align:center;}

        /* 面板 */
        #history-panel,#bg-settings-panel{max-height:0;overflow:hidden;transition:max-height 0.4s ease, padding 0.4s ease, border-width 0.4s ease;margin-top:10px;border:1px solid var(--sk-border);border-radius:16px;}
        #history-panel.show{max-height:300px;padding:15px;border-width:1px;}
        #bg-settings-panel.show{max-height:400px;padding:15px;border-width:1px;}
        #lyric-panel{max-height:0;overflow:hidden;transition:max-height 0.4s ease, padding 0.4s ease, border-width 0.4s ease;margin-top:10px;border:1px solid var(--sk-border);border-radius:16px;background:rgba(0,0,0,0.15);}
        #lyric-panel.show{max-height:280px;padding:15px;border-width:1px;}
        .lyric-header{display:flex;justify-content:space-between;padding:10px 14px;background:rgba(255,158,181,0.05);border-bottom:1px solid var(--sk-border);font-size:0.82rem;color:var(--sk-accent);}
        #lyric-content{max-height:220px;overflow-y:auto;padding:30px 0;scroll-behavior:smooth;text-align:center;position:relative;}
        #history-content{max-height:180px;overflow-y:auto;padding:10px;scroll-behavior:smooth;}
        .lyric-line{padding:5px 10px;cursor:pointer;font-size:0.85rem;color:var(--sk-muted);transition:all 0.3s;border-radius:10px;line-height:1.5;}
        .lyric-line:hover{background:rgba(255,158,181,0.06);} .lyric-line.active{color:var(--sk-accent);font-weight:600;font-size:1rem;text-shadow:0 0 10px rgba(255,158,181,0.5);} .lyric-line.past{opacity:0.35;}
        .lyric-empty,.history-empty{text-align:center;padding:18px;color:var(--sk-muted);}
        .history-item{display:flex;align-items:center;padding:7px;gap:8px;border-bottom:1px solid rgba(255,158,181,0.05);}
        .history-info{flex:1;cursor:pointer;} .history-name{font-size:0.82rem;} .history-artist{font-size:0.68rem;color:var(--sk-muted);}
        .history-time{font-size:0.62rem;color:var(--sk-muted);} .history-delete{cursor:pointer;color:var(--sk-muted);} .history-delete:hover{color:#ff6b6b;}
        .bg-option{display:inline-block;width:80px;margin:6px;text-align:center;cursor:pointer;border:1px solid transparent;border-radius:14px;padding:4px;}
        .bg-option.active,.bg-option:hover{border-color:var(--sk-accent);} .bg-option img{width:100%;border-radius:12px;} .bg-option-label{font-size:0.68rem;color:var(--sk-muted);margin-top:3px;}
        .bg-upload-btn{display:inline-block;padding:8px 14px;background:rgba(255,158,181,0.08);border:1px solid var(--sk-border);color:var(--sk-text);cursor:pointer;border-radius:14px;font-size:0.78rem;margin:6px 0;}
        .bg-upload-btn input{display:none;}
        .bg-url-input{width:100%;padding:8px;background:rgba(255,158,181,0.05);border:1px solid rgba(255,158,181,0.12);color:var(--sk-text);border-radius:12px;font-size:0.78rem;outline:none;}
        .bg-reset-btn{padding:6px 12px;background:rgba(255,71,87,0.08);border:1px solid rgba(255,71,87,0.2);color:#ff6b6b;cursor:pointer;border-radius:12px;font-size:0.78rem;}
        .video-scale-selector{margin-top:6px;font-size:0.72rem;color:var(--sk-muted);}
        .video-scale-btn{padding:4px 8px;background:rgba(255,158,181,0.05);border:1px solid rgba(255,158,181,0.1);color:var(--sk-muted);cursor:pointer;border-radius:10px;font-size:0.68rem;margin:0 3px;}
        .video-scale-btn.active{border-color:var(--sk-accent);color:var(--sk-accent);}

        /* Toast */
        #toast{position:fixed;top:auto;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);z-index:99999;background:var(--sk-surface);border:1px solid var(--sk-border);color:var(--sk-text);padding:12px 24px;border-radius:18px;backdrop-filter:blur(20px);transition:transform 0.4s;font-size:0.85rem;}
        #toast.show{transform:translateX(-50%) translateY(0);}

        /* 日志 */
        #log-trigger-btn{position:fixed;bottom:20px;right:20px;z-index:9998;width:44px;height:44px;border-radius:16px;background:var(--sk-surface);border:1px solid var(--sk-border);color:var(--sk-accent);cursor:pointer;backdrop-filter:blur(20px);transition:all 0.3s;}
        #log-trigger-btn:hover{background:rgba(255,158,181,0.15);}
        #log-panel{position:fixed;bottom:0;right:0;width:400px;max-height:55vh;z-index:9999;background:rgba(26,10,16,0.97);border:1px solid var(--sk-border);border-radius:20px 0 0 0;transform:translateY(100%);transition:transform 0.4s;overflow:hidden;display:flex;flex-direction:column;backdrop-filter:blur(20px);}
        #log-panel.show{transform:translateY(0);}
        .log-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--sk-border);font-size:0.82rem;color:var(--sk-accent);}
        .log-filter-tabs{display:flex;gap:5px;padding:8px 12px;border-bottom:1px solid rgba(255,158,181,0.08);overflow-x:auto;}
        .log-tab{font-size:0.68rem;padding:3px 8px;border-radius:10px;cursor:pointer;color:var(--sk-muted);border:1px solid transparent;transition:all 0.2s;}
        .log-tab.active{color:var(--sk-accent);border-color:var(--sk-accent);}
        #log-content{flex:1;overflow-y:auto;padding:10px;}
        .log-item{padding:8px;margin-bottom:5px;border-left:2px solid var(--sk-accent);background:rgba(255,158,181,0.03);font-size:0.72rem;border-radius:0 10px 10px 0;}
        .log-item.log-hidden{display:none;}
        .log-time{font-size:0.62rem;color:var(--sk-muted);} .log-cat-badge{font-size:0.52rem;padding:1px 4px;border-radius:8px;margin-left:5px;}
        .cat-system,.cat-player,.cat-api,.cat-lyrics,.cat-weather,.cat-error{background:rgba(255,158,181,0.1);color:var(--sk-accent);} .cat-error{color:#ff6b6b;}
        .log-data,.log-error{font-family:monospace;font-size:0.68rem;color:var(--sk-muted);background:rgba(0,0,0,0.2);padding:5px;border-radius:6px;white-space:pre-wrap;word-break:break-all;max-height:100px;overflow-y:auto;} .log-error{color:#ff6b6b;}

        /* 侧边栏 */
        #sidebar{position:fixed;top:0;left:-300px;width:270px;height:100vh;z-index:10000;background:rgba(26,10,16,0.98);border-right:1px solid var(--sk-border);transition:left 0.4s;overflow-y:auto;backdrop-filter:blur(20px);}
        #sidebar.show{left:0;} #sidebar-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:rgba(0,0,0,0.5);opacity:0;pointer-events:none;transition:opacity 0.4s;} #sidebar-overlay.show{opacity:1;pointer-events:auto;}
        #sidebar-trigger{position:fixed;top:20px;left:20px;z-index:9998;width:40px;height:40px;border-radius:16px;background:var(--sk-surface);border:1px solid var(--sk-border);color:var(--sk-accent);cursor:pointer;backdrop-filter:blur(20px);transition:all 0.3s;}
        .sidebar-header{padding:20px;border-bottom:1px solid var(--sk-border);text-align:center;} .sidebar-header h2{font-family:'Zen Maru Gothic',sans-serif;font-size:1.1rem;color:var(--sk-accent);letter-spacing:3px;}
        .sidebar-link{display:flex;align-items:center;gap:10px;padding:11px 20px;color:var(--sk-text);text-decoration:none;font-size:0.85rem;transition:all 0.3s;border-left:2px solid transparent;}
        .sidebar-link:hover{background:rgba(255,158,181,0.06);border-left-color:var(--sk-accent);color:var(--sk-accent);}
        .sidebar-section-title{padding:10px 20px;font-size:0.7rem;color:var(--sk-muted);letter-spacing:2px;}
        .link-badge{font-size:0.58rem;padding:2px 6px;border:1px solid rgba(255,209,220,0.3);color:var(--sk-accent2);border-radius:10px;margin-left:auto;}
        .sidebar-footer{padding:15px 20px;border-top:1px solid var(--sk-border);}
        .sidebar-night-btn{width:100%;padding:10px;background:rgba(255,158,181,0.08);border:1px solid var(--sk-border);color:var(--sk-text);cursor:pointer;border-radius:14px;font-size:0.85rem;}

        /* Bio */
