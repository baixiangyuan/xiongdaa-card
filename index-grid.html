<!DOCTYPE html>
<html lang="zh-CN" data-theme="grid">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
<title>bxy · 网格</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="tools/common.css">
<style>
:root{--gd-bg:#0d1f1c;--gd-surface:rgba(13,31,28,0.55);--gd-border:rgba(52,211,153,0.12);--gd-text:#e2e8f0;--gd-muted:rgba(148,163,184,0.6);--gd-accent:#34d399;--gd-accent2:#60a5fa;--gd-glow:rgba(52,211,153,0.15);--glass-bg:var(--gd-surface);--glass-border:var(--gd-border);--text-main:var(--gd-text);--text-muted:var(--gd-muted);--theme-accent:var(--gd-accent);--theme-accent2:var(--gd-accent2);}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans SC',sans-serif;-webkit-tap-highlight-color:transparent;}
body{min-height:100vh;display:block;background:var(--gd-bg);color:var(--gd-text);overflow-x:hidden;padding:0;}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 40% 30%,rgba(52,211,153,0.05) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(96,165,250,0.04) 0%,transparent 50%);}
#skeleton-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100000;background:var(--gd-bg);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 0.7s;}
#skeleton-overlay.fade-out{opacity:0;pointer-events:none;}
.skeleton-spinner{width:45px;height:45px;border:2px solid rgba(52,211,153,0.15);border-top-color:var(--gd-accent);border-radius:50%;animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.skeleton-text{color:var(--gd-accent);margin-top:16px;font-size:0.85rem;letter-spacing:3px;}

/* 卡片网格 */
.gd-wrap{position:relative;z-index:10;width:100%;max-width:1100px;margin:0 auto;padding:20px;animation:gdIn 0.8s ease forwards;}
@keyframes gdIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.gd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.gd-card{background:var(--gd-surface);backdrop-filter:blur(24px) saturate(130%);-webkit-backdrop-filter:blur(24px) saturate(130%);border:1px solid var(--gd-border);border-radius:20px;padding:24px;transition:all 0.4s;}
.gd-card:hover{border-color:rgba(52,211,153,0.25);box-shadow:0 8px 30px var(--gd-glow);}
.gd-card-title{font-size:0.72rem;text-transform:uppercase;letter-spacing:2px;color:var(--gd-muted);margin-bottom:14px;}

/* Card 1: 时钟 */
.gd-clock{grid-column:1;text-align:center;}
#clock-time{font-size:2.8rem;font-weight:700;letter-spacing:2px;color:var(--gd-accent);line-height:1.2;}
#clock-date{font-size:0.85rem;color:var(--gd-muted);margin-top:4px;}
#weather-widget{margin-top:14px;padding-top:14px;border-top:1px solid var(--gd-border);display:flex;align-items:center;justify-content:center;gap:12px;}
#weather-widget .weather-icon{color:var(--gd-accent);font-size:1.6rem;}
#weather-widget .weather-temp{font-size:1.3rem;font-weight:600;color:var(--gd-text);}
#weather-widget .weather-desc,#weather-widget .weather-city{font-size:0.75rem;color:var(--gd-muted);}
.weather-loading{color:var(--gd-muted);font-size:0.85rem;}

/* Card 2: 个人 */
.gd-profile{grid-column:1;text-align:center;}
.gd-avatar{width:80px;height:80px;border-radius:50%;margin:0 auto 14px;background:url('https://q1.qlogo.cn/g?b=qq&nk=3075304265&s=640') center/cover;border:2px solid rgba(52,211,153,0.3);box-shadow:0 6px 20px var(--gd-glow);}
.gd-name{font-size:1.3rem;font-weight:700;color:var(--gd-accent);margin-bottom:8px;}
#typed-text{font-size:0.85rem;color:var(--gd-muted);line-height:1.7;min-height:40px;margin-bottom:14px;}
.gd-links{display:flex;flex-direction:column;gap:7px;}
.gd-link{display:flex;align-items:center;gap:10px;padding:9px 14px;background:rgba(52,211,153,0.05);border:1px solid rgba(52,211,153,0.1);border-radius:12px;color:var(--gd-text);text-decoration:none;font-size:0.82rem;transition:all 0.3s;cursor:pointer;}
.gd-link:hover{background:rgba(52,211,153,0.12);border-color:var(--gd-accent);transform:translateX(4px);}
.gd-link i{width:18px;text-align:center;color:var(--gd-accent);}
.gd-stats{display:flex;justify-content:center;gap:20px;margin-top:14px;font-size:0.75rem;color:var(--gd-muted);}
.gd-stats .num{color:var(--gd-accent);font-weight:600;}

/* Card 3: 工具 */
.gd-tools{grid-column:2;}
.gd-tools-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.gd-tool{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;background:rgba(52,211,153,0.04);border:1px solid rgba(52,211,153,0.08);border-radius:14px;text-decoration:none;color:var(--gd-text);transition:all 0.3s;cursor:pointer;}
.gd-tool:hover{background:rgba(52,211,153,0.1);border-color:var(--gd-accent);transform:translateY(-2px);}
.gd-tool i{font-size:1.4rem;color:var(--gd-accent);}
.gd-tool span{font-size:0.68rem;color:var(--gd-muted);}

/* Card 4: 联系 */
.gd-contacts{grid-column:2;}
.gd-contact-list{display:flex;flex-direction:column;gap:7px;}
.gd-contact{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;background:rgba(96,165,250,0.04);border:1px solid rgba(96,165,250,0.1);text-decoration:none;color:var(--gd-text);font-size:0.82rem;transition:all 0.3s;cursor:pointer;}
.gd-contact:hover{background:rgba(96,165,250,0.1);border-color:var(--gd-accent2);}
.gd-contact i{width:18px;text-align:center;color:var(--gd-accent2);}
.gd-contacts .gd-stats{margin-top:12px;}

/* Card 5: 播放器 (占2列) */
.gd-player{grid-column:2/4;}
.gd-player-top{display:flex;align-items:center;gap:14px;margin-bottom:10px;}
#vinyl-record{width:64px;height:64px;border-radius:50%;flex-shrink:0;overflow:hidden;border:2px solid rgba(52,211,153,0.2);}
#vinyl-record.playing{animation:vinylSpin 3.5s linear infinite;}
@keyframes vinylSpin{to{transform:rotate(360deg);}}
#vinyl-record img{width:100%;height:100%;object-fit:cover;}
.gd-player-info{flex:1;min-width:0;}
#player-title{font-size:0.95rem;color:var(--gd-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#player-artist{font-size:0.75rem;color:var(--gd-muted);margin-top:2px;}
#player-source-tag{font-size:0.58rem;color:var(--gd-muted);border:1px solid var(--gd-border);padding:2px 6px;border-radius:8px;}
#progress-container{width:100%;height:4px;background:rgba(52,211,153,0.1);border-radius:2px;margin:10px 0;cursor:pointer;}
#progress-fill{height:100%;background:linear-gradient(90deg,var(--gd-accent),var(--gd-accent2));border-radius:2px;width:0%;}
.gd-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.gd-btn{background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.12);color:var(--gd-text);padding:7px 12px;border-radius:10px;cursor:pointer;font-size:0.78rem;transition:all 0.3s;}
.gd-btn:hover{background:rgba(52,211,153,0.18);border-color:var(--gd-accent);}
.gd-btn.play-pause{background:linear-gradient(135deg,var(--gd-accent),var(--gd-accent2));color:#fff;border:none;padding:9px 16px;}
.gd-search{display:flex;gap:6px;margin-top:8px;}
.gd-search input{flex:1;background:rgba(52,211,153,0.04);border:1px solid rgba(52,211,153,0.1);color:var(--gd-text);padding:8px 12px;border-radius:10px;font-size:0.82rem;outline:none;}
.gd-search input:focus{border-color:var(--gd-accent);}
.gd-search input::placeholder{color:var(--gd-muted);}

/* Card 6: 设置 */
.gd-settings{grid-column:3;}
.gd-setting-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;margin-bottom:8px;background:rgba(52,211,153,0.04);border:1px solid rgba(52,211,153,0.08);border-radius:12px;color:var(--gd-text);cursor:pointer;font-size:0.82rem;transition:all 0.3s;width:100%;}
.gd-setting-btn:hover{background:rgba(52,211,153,0.1);border-color:var(--gd-accent);}
.gd-setting-btn i{width:18px;color:var(--gd-accent);}

/* 隐藏面板 */
/* 隐藏面板 - 平滑展开 */
#lyric-panel,#history-panel,#bg-settings-panel{max-height:0;opacity:0;overflow:hidden;margin-top:0;padding:0 14px;background:rgba(13,31,28,0.4);border:1px solid var(--gd-border);border-radius:12px;font-size:0.82rem;transition:max-height 0.45s cubic-bezier(0.4,0,0.2,1),opacity 0.4s cubic-bezier(0.4,0,0.2,1),padding 0.4s cubic-bezier(0.4,0,0.2,1),margin-top 0.4s cubic-bezier(0.4,0,0.2,1);}
#lyric-panel.show,#history-panel.show,#bg-settings-panel.show{max-height:300px;opacity:1;margin-top:10px;padding:14px;}
.lyric-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:0.8rem;color:var(--gd-muted);}
#lyric-content{position:relative;overflow-y:auto;max-height:220px;padding:4px 0;}
..lyric-empty{text-align:center;color:var(--gd-muted);padding:20px;font-size:0.85rem;}
#bg-options{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.bg-option{width:60px;height:50px;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;opacity:0.6;transition:all 0.3s;}
.bg-option.active,.bg-option:hover{border-color:var(--gd-accent);opacity:1;}
.bg-option img{width:100%;height:100%;object-fit:cover;}
.bg-option-label{font-size:0.65rem;text-align:center;color:var(--gd-muted);margin-top:2px;}
.bg-url-input{width:100%;padding:7px 10px;border-radius:8px;border:1px solid var(--gd-border);background:rgba(13,31,28,0.4);color:var(--gd-text);font-size:0.78rem;outline:none;margin-top:6px;}
.bg-reset-btn,.bg-upload-btn{display:inline-block;padding:6px 12px;border-radius:6px;border:1px solid var(--gd-border);background:rgba(52,211,153,0.06);color:var(--gd-muted);cursor:pointer;font-size:0.75rem;margin-top:4px;}
.video-scale-selector{display:flex;gap:6px;margin-top:6px;}
.video-scale-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--gd-border);background:rgba(52,211,153,0.04);color:var(--gd-muted);cursor:pointer;font-size:0.72rem;}
.video-scale-btn.active{border-color:var(--gd-accent);color:var(--gd-accent);}
.lyric-line{padding:6px 10px;cursor:pointer;font-size:0.82rem;color:var(--gd-muted);transition:all 0.3s;border-radius:8px;line-height:1.5;}
.lyric-line:hover{background:rgba(52,211,153,0.06);}
.lyric-line.active{color:var(--gd-accent);font-weight:600;font-size:0.95rem;text-shadow:0 0 10px rgba(52,211,153,0.4);}
.lyric-line.past{opacity:0.35;}
.music-list
.music-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid rgba(52,211,153,0.05);cursor:pointer;transition:all 0.2s;border-radius:8px;}
.music-item:hover,.music-item.active{background:rgba(52,211,153,0.06);}
.music-item .music-name{font-size:0.82rem;}
.music-item .music-artist{font-size:0.7rem;color:var(--gd-muted);}
.status-msg{text-align:center;color:var(--gd-muted);padding:10px;font-size:0.85rem;}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:10000;background:rgba(13,31,28,0.9);backdrop-filter:blur(16px);border:1px solid var(--gd-border);border-radius:12px;padding:10px 20px;display:none;font-size:0.85rem;color:var(--gd-text);}
